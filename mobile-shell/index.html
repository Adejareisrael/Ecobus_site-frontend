<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover,width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no"
    />
    <meta name="theme-color" content="#2563eb" />
    <title>Ecobus</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        align-items: center;
        background: #071327;
        color: #f8fafc;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        text-align: center;
      }

      main {
        margin: auto;
        max-width: 360px;
      }

      img {
        height: auto;
        margin-bottom: 24px;
        max-width: 180px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/ecobus-logo.jpg" alt="Ecobus" />
      <h1>Ecobus</h1>
      <p>Connecting to Ecobus Transport...</p>
    </main>
  </body>
</html>
